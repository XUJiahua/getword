        bottom: 0;

        left: 0;

      // 笔顺数据：CDN 懒加载 + 内存缓存（按字符）。失败则保留文字占位作降级。
      // 数据源 hanzi-writer-data v2.0.1（make-me-a-hanzi 派生），ARPHIC PL。
      const STROKES_CDN =
        "https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0.1";
      const SVG_NS = "http://www.w3.org/2000/svg";
      const strokeCache = new Map();
      let renderVersion = 0;
      let pendingStrokeFills = Promise.resolve();

      function loadStrokes(ch) {
        if (strokeCache.has(ch)) return strokeCache.get(ch);
        const url = `${STROKES_CDN}/${encodeURIComponent(ch)}.json`;
        const promise = fetch(url, { mode: "cors" })
          .then((r) => {
            if (!r.ok) throw new Error(`http ${r.status}`);
            return r.json();
          })
          .catch(() => {
            strokeCache.delete(ch); // 失败可重试
            return null;
          });
        strokeCache.set(ch, promise);
        return promise;
      }

      function buildStrokeSvg(data, options = {}) {
        // highlightIndex: 整数 → 显示前 highlightIndex+1 笔，最后一笔高亮 + 起笔点；
        //                 缺省/null → 完整字（描红用）。
        const { highlightIndex = null } = options;
        const svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("viewBox", "0 0 1024 1024");
        svg.setAttribute("class", "glyph");
        svg.setAttribute("aria-hidden", "true");
        const g = document.createElementNS(SVG_NS, "g");
        // make-me-a-hanzi 的 path 在 1024x1024 内、Y 轴向上，整体翻一下到屏幕坐标。
        g.setAttribute("transform", "translate(0,900) scale(1,-1)");
        const upTo =
          highlightIndex == null ? data.strokes.length - 1 : highlightIndex;
        for (let i = 0; i <= upTo && i < data.strokes.length; i += 1) {
          const p = document.createElementNS(SVG_NS, "path");
          p.setAttribute("d", data.strokes[i]);
          if (highlightIndex != null && i === highlightIndex) {
            p.setAttribute("class", "new-stroke");
          }
          g.append(p);
        }
        if (
          highlightIndex != null &&
          data.medians &&
          data.medians[highlightIndex] &&
          data.medians[highlightIndex][0]
        ) {
          const [x, y] = data.medians[highlightIndex][0];
          const dot = document.createElementNS(SVG_NS, "circle");
          dot.setAttribute("cx", String(x));
          dot.setAttribute("cy", String(y));
          dot.setAttribute("r", "32");
          dot.setAttribute("class", "stroke-start");
          g.append(dot);
        }
        svg.append(g);
        return svg;
      }

      function fillStrokeSvgs(version) {
        const placeholders = els.sheet.querySelectorAll("[data-glyph-char]");
        if (!placeholders.length) return Promise.resolve();
        const byChar = new Map();
        placeholders.forEach((el) => {
          const ch = el.getAttribute("data-glyph-char");
          if (!byChar.has(ch)) byChar.set(ch, []);
          byChar.get(ch).push(el);
        });
        const tasks = Array.from(byChar.keys()).map((ch) =>
          loadStrokes(ch).then((data) => ({ ch, data })),
        );
        return Promise.all(tasks).then((results) => {
          if (version !== renderVersion) return; // 期间已重渲染，丢弃旧结果
          requestAnimationFrame(() => {
            if (version !== renderVersion) return;
            results.forEach(({ ch, data }) => {
              if (!data) return; // 失败：保留占位文字（与现有灰字效果一致）
              byChar.get(ch).forEach((el) => {
                const text = el.querySelector(".cell-text");
                if (text) {
                  text.replaceWith(buildStrokeSvg(data));
                  return;
                }
                if (el.classList.contains("line-cell")) {
                  el.textContent = "";
                  el.append(buildStrokeSvg(data));
                }
              });
            });
          });

      // strokes 模式：renderStrokesSheet 异步取完数据后写入这张表，
      // 同步路径下的 buildStrokesGroups 直接读取它。
      let strokesDataForRender = null;

      function makeStrokeCell(data, highlightIndex) {
        const gridType = els.gridType.value;
        const cell = document.createElement("span");
        cell.className =
          gridType === "line"
            ? "line-cell"
            : `cell ${gridType === "mi" ? "mi" : ""}`;
        if (gridType === "mi") {
          const forward = document.createElement("span");
          forward.className = "cell-diagonal forward";
          const back = document.createElement("span");
          back.className = "cell-diagonal back";
          cell.append(forward, back);
        }
        cell.append(buildStrokeSvg(data, { highlightIndex }));
        return cell;
      }

      function buildStrokesGroups(item) {
        const grid = document.createElement("div");
        grid.className = "practice-grid strokes-grid";
        const chars = chineseChars(item.word);
        const pinyinParts = splitPinyin(item);

        chars.forEach((ch, charIndex) => {
          const data = strokesDataForRender
            ? strokesDataForRender.get(ch)
            : null;
          const unit = document.createElement("div");
          unit.className = "char-unit strokes-unit";

          const py = document.createElement("div");
          py.className = "char-pinyin";
          py.textContent = pinyinParts[charIndex] || "";

          const cells = document.createElement("div");
          cells.className = "unit-cells";

          if (!data) {
            // 数据缺失（CDN 失败/离线）：降级为单格描红，保持可用。
            cells.append(makeCell(ch, false, true));
          } else {
            cells.append(makeStrokeCell(data, null));
            for (let s = 0; s < data.strokes.length; s += 1) {
              cells.append(makeStrokeCell(data, s));
            }
          }

          unit.append(py, cells);
          grid.append(unit);
        });
        return grid;
      }

      async function renderStrokesSheet(version) {
        // 占位：异步阶段告知用户正在加载。

        els.sheet.append(loading);

        items.forEach((it) =>
          chineseChars(it.word).forEach((ch) => allChars.add(ch)),
        );
        const entries = await Promise.all(
          Array.from(allChars).map((ch) =>
            loadStrokes(ch).then((data) => [ch, data]),
          ),
        );
        if (version !== renderVersion) return;
        strokesDataForRender = new Map(entries);

        // 同步路径渲染分页，复用 buildPage（内部 buildPracticeGroups 已分流）。
        els.sheet.innerHTML = "";
        const perPage = Number(els.perPage.value);
        const pages = [];
        if (!items.length) {
          pages.push([]);
        } else {
          for (let i = 0; i < items.length; i += perPage) {
            pages.push(items.slice(i, i + perPage));
          }
        }
        const frag = document.createDocumentFragment();
        pages.forEach((pageItems, pageIndex) => {
          frag.append(buildPage(pageItems, pageIndex * perPage));

        els.sheet.append(frag);

        const pinyinLoaded =

        els.pinyinStatus.className = pinyinLoaded ? "status" : "status warn";

      const storageKeys = {
        masteredWords: "getword.masteredWords",

      const STATUS_LEARNING = "learning";
      const STATUS_MASTERED = "mastered";
      const wordRecords = new Map();
      let printFilter = "all";

      function getRecord(word) {
        return wordRecords.get(word) || null;
      }
      function getStatus(word) {
        const r = wordRecords.get(word);
        return r ? r.status : "";
      }
      function setStatus(word, status) {
        const w = (word || "").trim();
        if (!w) return false;
        const now = Date.now();
        const cur = wordRecords.get(w);
        if (!status) {
          if (!cur) return false;
          wordRecords.delete(w);
          return true;
        }
        if (status !== STATUS_LEARNING && status !== STATUS_MASTERED) return false;
        if (cur && cur.status === status) return false;
        const next = cur || {
          status,
          firstSeen: now,
          lastSuccess: 0,
          lastFail: 0,
          successStreak: 0,
          failCount: 0,
          updatedAt: now,
        };
        next.status = status;
        next.updatedAt = now;
        if (status === STATUS_MASTERED) {
          next.lastSuccess = now;
          next.successStreak = (cur && cur.successStreak ? cur.successStreak : 0) + 1;
        } else if (status === STATUS_LEARNING) {
          next.lastFail = now;
          next.failCount = (cur && cur.failCount ? cur.failCount : 0) + 1;
          next.successStreak = 0;
        }
        wordRecords.set(w, next);
        return true;
      }
      function wordsByStatus(status) {
        const out = [];
        wordRecords.forEach((rec, word) => {
          if (rec.status === status) out.push(word);
        });
        return out;
      }
      function recordsCount(status) {
        let n = 0;
        wordRecords.forEach((rec) => {
          if (rec.status === status) n += 1;
        });
        return n;

      function loadWordRecords() {
        try {
          const raw = localStorage.getItem(storageKeys.records);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed === "object") {
              for (const [word, rec] of Object.entries(parsed)) {
                if (typeof word !== "string" || !rec || typeof rec !== "object") continue;
                if (rec.status !== STATUS_LEARNING && rec.status !== STATUS_MASTERED) continue;
                wordRecords.set(word, {
                  status: rec.status,
                  firstSeen: Number(rec.firstSeen) || 0,
                  lastSuccess: Number(rec.lastSuccess) || 0,
                  lastFail: Number(rec.lastFail) || 0,
                  successStreak: Number(rec.successStreak) || 0,
                  failCount: Number(rec.failCount) || 0,
                  updatedAt: Number(rec.updatedAt) || 0,
                });
              }
            }
          }
        } catch (error) {
          /* corrupt records -> start fresh */
        }

        try {
          const filter = localStorage.getItem(storageKeys.printFilter);
          if (filter) printFilter = filter;
        } catch (error) {
          /* ignore */
        }

        // 旧版迁移：把 getword.masteredWords / getword.hideMastered 映射到新结构。
        // 保留旧 key 不删除，便于回退。
        let migrated = false;
        try {
          const legacyMastered = localStorage.getItem(storageKeys.masteredWords);
          if (legacyMastered && !localStorage.getItem(storageKeys.records)) {
            const now = Date.now();
            legacyMastered
              .split(/\n+/)
              .map((s) => s.trim())
              .filter(Boolean)
              .forEach((w) => {
                if (!wordRecords.has(w)) {

                    status: STATUS_MASTERED,
                    firstSeen: now,
                    lastSuccess: now,
                    lastFail: 0,
                    successStreak: 1,
                    failCount: 0,
                    updatedAt: now,
                  });
                }
              });
            migrated = true;
          }
        } catch (error) {
          /* ignore */

        try {
          const legacyHide = localStorage.getItem(storageKeys.hideMastered);
          if (legacyHide && !localStorage.getItem(storageKeys.printFilter)) {
            printFilter = legacyHide === "yes" ? "hideMastered" : "all";
            migrated = true;
          }
        } catch (error) {
          /* ignore */
        }
        if (migrated) saveWordRecords();
      }

      function chineseChars(word) {
        return Array.from(word).filter((char) => /\p{Script=Han}/u.test(char));

      function numberToTone(syllable) {
        const match = syllable.match(/^([a-züv:]+)([1-5])$/i);
        if (!match) return syllable.replace("u:", "ü").replace("v", "ü");
        let base = match[1].toLowerCase().replace("u:", "ü").replace("v", "ü");
        const tone = Number(match[2]);
        if (tone === 5) return base;

        let target = -1;
        if (base.includes("a")) target = base.indexOf("a");
        else if (base.includes("e")) target = base.indexOf("e");
        else if (base.includes("ou")) target = base.indexOf("o");
        else {
          for (let i = base.length - 1; i >= 0; i -= 1) {
            if ("aeiouü".includes(base[i])) {
              target = i;
              break;
            }
          }
        }

        if (target < 0) return base;
        const markSet = toneMarks[base[target]];
        return `${base.slice(0, target)}${markSet[tone - 1]}${base.slice(target + 1)}`;
      }

      function fallbackWordPinyin(word) {
        return chineseChars(word)
          .map((char) => numberToTone(fallbackPinyin.get(char) || char))
          .join(" ");
      }

      function autoPinyin(word) {
        const pinyinFn =
          window.pinyinPro && typeof window.pinyinPro.pinyin === "function"
            ? window.pinyinPro.pinyin
            : null;

        if (!pinyinFn) {
          return fallbackWordPinyin(word);
        }

        try {
          return pinyinFn(word, {
            toneType: "symbol",
            type: "array",
            nonZh: "removed",
          }).join(" ");
        } catch (error) {
          return fallbackWordPinyin(word);
        }
      }

        if (prev) els.wordBank.value = prev;
      }

      function populateUnitSelect(bankKey) {
        els.wordUnit.innerHTML = "";
        const all = document.createElement("option");
        all.value = "";
        all.textContent = "整册全部";
        els.wordUnit.append(all);
        const bank = wordBanks[bankKey];
        if (!bank) {
          els.wordUnit.disabled = true;
          updateBankSource(null, null);
          return;
        }
        bank.units.forEach((unit) => {
          const opt = document.createElement("option");
          opt.value = unit.key;
          opt.textContent = unit.name;
          els.wordUnit.append(opt);
        });
        els.wordUnit.disabled = false;
        updateBankSource(bank, null);
      }

      // 数据来源 chip：只在 bank.source 存在时显示。
      // 选了具体单元 → 列出该单元包含的课次；选「整册全部」→ 给整册概览。
      // 没 source 字段的旧 bank（凭印象编的那些）不显示，作为隐性差异提示。
      function updateBankSource(bank, unit) {
        const root = els.bankSource;
        if (!root) return;
        if (!bank || !bank.source) {
          root.hidden = true;
          return;
        }
        root.hidden = false;
        els.bankSourcePill.textContent = bank.source.label || bank.source.type || "";
        let meta = "";
        if (unit && Array.isArray(unit.lessons) && unit.lessons.length) {
          meta = "出处：" + unit.lessons.map((l) => `${l.no} ${l.title}`).join(" · ");
        } else if (Array.isArray(bank.units)) {
          const lessonCount = bank.units.reduce(
            (a, u) => a + (Array.isArray(u.lessons) ? u.lessons.length : 0),
            0,
          );
          meta = `整册 ${bank.units.length} 单元 / ${lessonCount} 课`;
        }
        els.bankSourceMeta.textContent = meta;
      }

      function loadSelectedBank({ silent = false } = {}) {
        const bankKey = els.wordBank.value;
        const bank = wordBanks[bankKey];
        if (!bank) {
          els.bankStatus.textContent = "请选择年级/册次。";
          return;
        }

        const unitKey = els.wordUnit.value;
        const words = unitWords(bankKey, unitKey);
        const unit = unitKey ? bank.units.find((u) => u.key === unitKey) : null;
        const label = unit ? `${bank.name}·${unit.name}` : `${bank.name}（整册）`;

        const currentWords = splitWords(els.words.value);
        if (!silent && currentWords.length) {
          const shouldReplace = window.confirm(
            `加载“${label}”会替换当前输入的 ${currentWords.length} 个字词。是否继续？`,
          );
          if (!shouldReplace) return;
        }

        customPinyin = new Map();
        saveCustomPinyin();
        els.words.value = words.join("\n");
        els.bankStatus.textContent = `已加载“${label}”，共 ${words.length} 个字词。`;
        if (unit) {
          els.title.value = `${bank.short || bank.name} ${unit.name} 看拼音写汉字`;
        } else {
          els.title.value = `${bank.name} 看拼音写汉字`;
        }
        writeHash(bankKey, unitKey);
        updateDocumentTitle();
        updateBankSource(bank, unit);
        syncItems();
      }

      function readHash() {
        const hash = window.location.hash.replace(/^#/, "");
        if (!hash) return { bank: "", unit: "" };
        const params = new URLSearchParams(hash);
        return {
          bank: params.get("bank") || "",
          unit: params.get("unit") || "",
        };
      }

      function writeHash(bank, unit) {
        const params = new URLSearchParams();
        if (bank) params.set("bank", bank);
        if (unit) params.set("unit", unit);
        const next = params.toString();
        const target = next ? `#${next}` : "";
        if (window.location.hash !== target) {
          history.replaceState(null, "", target || window.location.pathname);
        }
      }

      function applyHashOnLoad() {
        const { bank, unit } = readHash();
        if (!bank || !wordBanks[bank]) return false;
        els.wordBank.value = bank;
        populateUnitSelect(bank);
        if (unit && wordBanks[bank].units.some((u) => u.key === unit)) {
          els.wordUnit.value = unit;
        }
        loadSelectedBank({ silent: true });
        return true;
      }

      function updateDocumentTitle() {
        const bankKey = els.wordBank.value;
        const unitKey = els.wordUnit.value;
        const bank = wordBanks[bankKey];
        const unit = bank && unitKey ? bank.units.find((u) => u.key === unitKey) : null;
        const base = "看拼音写汉字练习纸";
        if (bank && unit) {
          document.title = `${bank.short || bank.name} ${unit.name} - ${base}`;
        } else if (bank) {
          document.title = `${bank.name} - ${base}`;
        } else {
          document.title = `${base} | 一到六年级部编版语文练字打印工具`;
        }
      }

      function renderQuickBankLinks() {
        if (!els.quickBankLinks) return;
        els.quickBankLinks.innerHTML = "";
        wordBankOrder.forEach((bankKey) => {
          const bank = wordBanks[bankKey];
          if (!bank) return;
          const block = document.createElement("section");
          block.className = "quick-bank-block";

          const title = document.createElement("h4");
          const titleLink = document.createElement("a");
          titleLink.href = `#bank=${bankKey}`;
          titleLink.textContent = `${bank.name}（整册）`;
          title.append(titleLink);
          block.append(title);

          const list = document.createElement("ul");
          bank.units.forEach((unit) => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = `#bank=${bankKey}&unit=${unit.key}`;
            a.textContent = unit.name;
            li.append(a);
            list.append(li);
          });
          block.append(list);
          els.quickBankLinks.append(block);
        });
      }

      function renderPinyinEditor() {
        els.pinyinList.innerHTML = "";
        if (!items.length) {
          els.pinyinList.innerHTML = hiddenMasteredCount
            ? '<p class="hint">当前字词已全部隐藏，暂无需要校对的拼音。</p>'
            : '<p class="hint">输入词语后可校对拼音。</p>';
          return;
        }

        const frag = document.createDocumentFragment();
        items.forEach((item) => {
          const polyInfo = getPolyphonesInWord(item.word);

          const row = document.createElement("div");
          row.className = "pinyin-row";

          const main = document.createElement("div");
          main.className = "pinyin-main";

          const word = document.createElement("div");
          word.className =
            "word-chip" + (polyInfo.length ? " has-polyphone" : "");
          word.title = polyInfo.length
            ? `${item.word}（含多音字：${polyInfo.map((p) => p.char).join("、")}）`
            : item.word;
          word.append(document.createTextNode(item.word));
          if (polyInfo.length) {
            const badge = document.createElement("span");
            badge.className = "polyphone-badge";
            badge.textContent = "多音";
            word.append(badge);
          }

          const input = document.createElement("input");
          input.value = item.pinyin;
          input.setAttribute("aria-label", `${item.word} 的拼音`);

          const statusGroup = document.createElement("div");
          statusGroup.className = "status-toggle";
          [
            { key: STATUS_LEARNING, label: "生词" },
            { key: STATUS_MASTERED, label: "已掌握" },
          ].forEach((opt) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "status-chip";
            btn.dataset.status = opt.key;
            btn.textContent = opt.label;
            btn.setAttribute("aria-pressed", String(getStatus(item.word) === opt.key));
            if (getStatus(item.word) === opt.key) btn.classList.add("active");
            btn.addEventListener("click", () => {
              const next = getStatus(item.word) === opt.key ? "" : opt.key;
              setStatus(item.word, next);
              saveWordRecords();
              syncRecordsTextareas();
              syncItems();
            });
            statusGroup.append(btn);
          });

          main.append(word, input, statusGroup);
          row.append(main);

          let hintsRow = null;
          if (polyInfo.length) {
            hintsRow = document.createElement("div");
            hintsRow.className = "polyphone-hints";
            polyInfo.forEach((p) => {
              const group = document.createElement("div");
              group.className = "polyphone-group";
              group.dataset.charIndex = String(p.index);

              const lbl = document.createElement("span");
              lbl.className = "label";
              lbl.textContent = `${p.char}：`;
              group.append(lbl);

              p.options.forEach((opt) => {
                const chip = document.createElement("button");
                chip.type = "button";
                chip.className = "polyphone-chip";
                chip.dataset.pinyin = opt.p;
                const py = document.createElement("span");
                py.textContent = opt.p;
                const ex = document.createElement("span");
                ex.className = "ex";
                ex.textContent = opt.e;
                chip.append(py, ex);
                chip.addEventListener("click", () => {
                  const parts = splitPinyin(item);
                  parts[p.index] = opt.p;
                  const next = parts.join(" ");
                  customPinyin.set(item.word, next);
                  item.pinyin = next;
                  input.value = next;
                  refreshActive();
                  renderSheet();
                  saveCustomPinyin();
                });
                group.append(chip);
              });
              hintsRow.append(group);
            });
            row.append(hintsRow);
          }

          function refreshActive() {
            if (!hintsRow) return;
            const parts = splitPinyin(item);
            hintsRow.querySelectorAll(".polyphone-group").forEach((g) => {
              const idx = Number(g.dataset.charIndex);
              const cur = parts[idx] || "";
              g.querySelectorAll(".polyphone-chip").forEach((chip) => {
                chip.classList.toggle(
                  "active",
                  chip.dataset.pinyin === cur,
                );
              });
            });
          }

          input.addEventListener("input", () => {
            const v = input.value.trim();
            customPinyin.set(item.word, v);
            item.pinyin = v;
            refreshActive();
            renderSheet();
            saveCustomPinyin();
          });

          refreshActive();
          frag.append(row);
        });

        els.pinyinList.append(frag);
      }

      function makeCell(char, isSource = false, useSvgGlyph = false) {
        const gridType = els.gridType.value;
        const cell = document.createElement("span");
        cell.className =
          gridType === "line"
            ? "line-cell"
            : `cell ${gridType === "mi" ? "mi" : ""}`;
        if (!char) cell.classList.add("blank");
        if (isSource) cell.classList.add("copy-source");
        // 标记需要异步填充笔形 SVG。失败时保留文字占位，视觉上即旧版灰字。
        if (useSvgGlyph && char) cell.dataset.glyphChar = char;

        if (gridType === "line") {
          cell.textContent = char || "字";
          return cell;
        }

        if (gridType === "mi") {
          const forward = document.createElement("span");
          forward.className = "cell-diagonal forward";
          const back = document.createElement("span");
          back.className = "cell-diagonal back";
          cell.append(forward, back);
        }

        const text = document.createElement("span");
        text.className = "cell-text";
        text.textContent = char || "字";
        cell.append(text);
        return cell;
      }

      function splitPinyin(item) {
        const parts = item.pinyin.split(/\s+/).filter(Boolean);
        const chars = chineseChars(item.word);
        if (parts.length === chars.length) return parts;
        if (chars.length === 1) return [item.pinyin];
        return chars.map((_, index) => parts[index] || "");
      }

      function buildPracticeGroups(item) {
        const mode = els.mode.value;
        if (mode === "strokes") return buildStrokesGroups(item);

        const repeat = Number(els.copies.value);
        const chars = chineseChars(item.word);
        const pinyinParts = splitPinyin(item);
        const grid = document.createElement("div");
        grid.className = "practice-grid";

        chars.forEach((char, charIndex) => {
          const unit = document.createElement("div");
          unit.className = "char-unit";

          const py = document.createElement("div");
          py.className = "char-pinyin";
          py.textContent = mode === "dictation" ? "" : pinyinParts[charIndex];

          const cells = document.createElement("div");
          cells.className = "unit-cells";

          if (mode === "copy") {
            cells.append(makeCell(char, true));
            for (let i = 0; i < repeat; i += 1) {
              cells.append(makeCell(""));
            }
          } else {
            const showChar = mode === "trace" ? char : "";
            const useSvg = mode === "trace";
            for (let i = 0; i < repeat; i += 1) {
              cells.append(makeCell(showChar, false, useSvg));
            }
          }

          unit.append(py, cells);
          grid.append(unit);
        });

        return grid;
      }

      function buildPage(pageItems, startIndex) {
        const page = document.createElement("article");
        page.className = "page";

        const head = document.createElement("header");
        head.className = "paper-head";

        const title = document.createElement("h2");
        title.className = "paper-title";
        title.textContent = els.title.value.trim();
        head.append(title);

        if (els.showMeta.value === "yes") {
          const meta = document.createElement("div");
          meta.className = "paper-meta";
          const dateText = els.dateText.value.trim();
          meta.innerHTML = `
            <span>姓名 <i class="meta-line"></i></span>
            <span>${dateText ? `日期 ${escapeHtml(dateText)}` : '日期 <i class="meta-line"></i>'}</span>
          `;
          head.append(meta);
        }

        page.append(head);

        const list = document.createElement("div");
        list.className = "word-list";

        pageItems.forEach((item, idx) => {
          const mode = els.mode.value;
          const row = document.createElement("section");
          row.className = "item";

          const index = document.createElement("div");
          index.className = "index";
          index.textContent = `${startIndex + idx + 1}.`;

          const practice = document.createElement("div");
          practice.className = "practice";

          practice.append(buildPracticeGroups(item));
          row.append(index, practice);
          list.append(row);
        });

        if (!pageItems.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent =
            hiddenMasteredCount || printFilter !== "all"
              ? "当前字词已被过滤掉，请调整「练习纸过滤」或字词记录。"
              : "请在左侧输入中文字词。";
          list.append(empty);
        }

        page.append(list);
        return page;
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          };
          return map[char];
        });
      }

      function renderSheet() {
        els.sheet.innerHTML = "";
        // strokes 模式走异步分支：必须先有数据才能确定 cell 数（=笔画数）。
        if (els.mode.value === "strokes") {
          const myVersion = ++renderVersion;
          pendingStrokeFills = renderStrokesSheet(myVersion);
          return;
        }
        const perPage = Number(els.perPage.value);
        const pages = [];

        if (!items.length) {
          pages.push([]);
        } else {
          for (let i = 0; i < items.length; i += perPage) {
            pages.push(items.slice(i, i + perPage));
          }
        }

        const frag = document.createDocumentFragment();
        pages.forEach((pageItems, pageIndex) => {
          frag.append(buildPage(pageItems, pageIndex * perPage));
        });
        els.sheet.append(frag);

        const pinyinLoaded =
          window.pinyinPro && typeof window.pinyinPro.pinyin === "function";
        els.pinyinStatus.textContent = pinyinLoaded
          ? ""
          : "未能加载完整拼音库，当前只使用内置示例字词拼音；联网后刷新页面可自动恢复。";
        els.pinyinStatus.className = pinyinLoaded ? "status" : "status warn";

        // 笔形 SVG 异步填充：版本号防止旧次渲染的结果覆盖新一次的 DOM。
        const myVersion = ++renderVersion;
        pendingStrokeFills = fillStrokeSvgs(myVersion);
      }

      function resetExample() {
        const confirmed = window.confirm(
          "将清空当前字词与设置，恢复为示例。继续？",
        );
        if (!confirmed) return;
        customPinyin = new Map();
        saveCustomPinyin();
        els.words.value = "春天\n学校\n认真\n一心一意\n长大\n音乐";
        els.title.value = "看拼音写汉字";
        els.dateText.value = "";
        els.mode.value = "write";
        els.gridType.value = "tian";
        els.copies.value = "1";
        els.perPage.value = "32";
        els.showMeta.value = "no";
        els.wordBank.value = "";
        populateUnitSelect("");
        writeHash("", "");
        updateDocumentTitle();
        els.bankStatus.textContent = "内置词库是可编辑参考，加载后仍可增删字词。";
        syncItems();
      }

      [
        els.words,
        els.title,
        els.dateText,
        els.mode,
        els.gridType,
        els.copies,
        els.perPage,
        els.showMeta,
      ].forEach((el) => {
        el.addEventListener("input", syncItems);
        el.addEventListener("change", syncItems);
      });

      els.printFilter.addEventListener("change", () => {
        printFilter = els.printFilter.value;
        saveWordRecords();
        syncItems();
      });

      // 两个 textarea 编辑后立即把内容写回 records，再回写 textarea 以做 trim/dedupe。
      function bindRecordsTextarea(box, status) {
        let timer = null;
        box.addEventListener("input", () => {
          clearTimeout(timer);
          // 防抖：避免每次按键都重排 textarea 光标。
          timer = setTimeout(() => {
            const changed = applyTextareaToRecords(box, status);
            if (changed) {
              saveWordRecords();
              syncItems();
            } else {
              updateRecordsStats();
            }
          }, 250);
        });
        box.addEventListener("blur", () => {
          clearTimeout(timer);
          const changed = applyTextareaToRecords(box, status);
          syncRecordsTextareas();
          if (changed) {
            saveWordRecords();
            syncItems();
          } else {
            updateRecordsStats();
          }
        });
      }
      bindRecordsTextarea(els.learningWordsBox, STATUS_LEARNING);
      bindRecordsTextarea(els.masteredWordsBox, STATUS_MASTERED);

      els.recordsClearBtn.addEventListener("click", () => {
        const total = wordRecords.size;
        if (!total) return;
        const ok = window.confirm(`将清空全部 ${total} 条字词记录（生词本与已掌握），确定？`);
        if (!ok) return;
        wordRecords.clear();
        saveWordRecords();
        syncRecordsTextareas();
        syncItems();
      });

      els.wordBank.addEventListener("change", () => {
        populateUnitSelect(els.wordBank.value);
        writeHash(els.wordBank.value, "");
        updateDocumentTitle();
      });

      els.wordUnit.addEventListener("change", () => {
        writeHash(els.wordBank.value, els.wordUnit.value);
        updateDocumentTitle();
        const bank = wordBanks[els.wordBank.value];
        const unitKey = els.wordUnit.value;
        const unit = bank && unitKey ? bank.units.find((u) => u.key === unitKey) : null;
        updateBankSource(bank, unit);
      });

      window.addEventListener("hashchange", () => {
        applyHashOnLoad();
      });

      els.printBtn.addEventListener("click", async () => {
        // trace 模式下，先等当前页的笔形 SVG 全部就绪，避免打印出占位文字。
        // 失败/超时也不阻塞打印（最坏情况下回退到原灰字）。
        els.printBtn.disabled = true;
        try {
          await Promise.race([
            pendingStrokeFills,
            new Promise((res) => setTimeout(res, 4000)),
          ]);
        } finally {
          els.printBtn.disabled = false;
        }
        window.print();
      });
      els.resetBtn.addEventListener("click", resetExample);
      els.loadBankBtn.addEventListener("click", () => loadSelectedBank());
      els.togglePreviewBtn.addEventListener("click", () => {
        setPreviewCollapsed(!els.app.classList.contains("preview-collapsed"));
      });

      loadWordRecords();
      refreshDynamicBanks();
      syncRecordsTextareas();
      if (els.printFilter) els.printFilter.value = printFilter;
      loadPreviewSettings();
      populateBankSelect();
      renderQuickBankLinks();
      loadConfigSettings();
      loadCustomPinyin();
      configHydrated = true;
      const loadedFromHash = applyHashOnLoad();
      if (!loadedFromHash) {
        updateDocumentTitle();
        syncItems();
      }
      window.addEventListener("load", syncItems);
    </script>
  </body>
</html>
