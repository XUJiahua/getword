    <style>
      :root {
        /* UI palette — cool ink on porcelain. Never appears on .page descendants. */
        --ink: oklch(28% 0.012 250);
        --ink-soft: oklch(45% 0.01 250);
        --ink-muted: oklch(60% 0.008 250);
        --line: oklch(85% 0.005 250);
        --line-soft: oklch(92% 0.004 250);
        --surface: oklch(99% 0.003 250);
        --surface-recessed: oklch(96% 0.005 250);
        --surface-page: oklch(96% 0.006 230);
        --ink-inverse: oklch(99% 0.003 80);

        /* Accent (墨青 / Ink Cyan) — ≤ 8% of any screen */
        --accent: oklch(42% 0.045 220);
        --accent-deep: oklch(35% 0.05 220);
        --accent-tint: oklch(95% 0.012 220);
        --accent-glow: oklch(42% 0.045 220 / 0.18);

        /* Caution (琥珀) — 多音字 chip system only */
        --caution: oklch(85% 0.12 80);
        --caution-tint: oklch(97% 0.04 80);
        --caution-pill: oklch(94% 0.05 80);
        --caution-deep: oklch(40% 0.08 60);

        /* Paper palette — print-grade only. Never appears outside .page descendants. */
        --paper: oklch(98.5% 0.006 80);
        --paper-cell: oklch(99% 0.002 80);
        --paper-ink: oklch(20% 0.005 250);
        --paper-meta-ink: oklch(45% 0.01 250);
        --paper-rule: oklch(56% 0.005 250);
        --paper-rule-soft: oklch(70% 0.005 250);
        --paper-trace: oklch(20% 0.005 250 / 0.22);
        --paper-shadow: oklch(20% 0.005 250 / 0.16);

        --danger: oklch(48% 0.16 25);

        /* Legacy aliases — kept so existing var() lookups resolve. */
        --muted: var(--ink-muted);
        --soft: var(--surface-recessed);
        --panel: var(--surface);
        --accent-dark: var(--accent-deep);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--surface-page);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        font-size: 15px;
        line-height: 1.55;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(320px, 420px) 1fr;
        min-height: 100vh;
      }

      .controls {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
        padding: 18px;
        background: var(--panel);
        border-right: 1px solid var(--line);
      }

      .controls h1 {
        margin: 0 0 14px;
        font-size: 22px;
        line-height: 1.25;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: start;
        margin-bottom: 14px;
      }

      .topbar h1 {
        margin: 0;
      }

      .section {
        padding: 14px 0;
        border-top: 1px solid var(--line-soft);
      }

      .section:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .label {
        display: block;
        margin: 0 0 7px;
        color: var(--ink-soft);
        font-size: 15px;
        font-weight: 650;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--ink);
        outline: none;
      }

      textarea:focus,
      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      textarea,
      input,
      select,
      .btn,
      .polyphone-chip,
      .word-chip {
        transition:
          border-color 140ms cubic-bezier(0.16, 1, 0.3, 1),
          background-color 140ms cubic-bezier(0.16, 1, 0.3, 1),
          color 140ms cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 140ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }

      textarea {
        min-height: 160px;
        resize: vertical;
        padding: 10px 11px;
        line-height: 1.7;
      }

      #masteredWords {
        min-height: 92px;
      }

      input,
      select {
        height: 40px;
        padding: 0 10px;
      }

      .hint,
      .status {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .status.warn {
        color: var(--danger);
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .field {
        min-width: 0;
      }

      .actions {
        display: flex;
        gap: 10px;
        padding-top: 4px;
      }

      .bank-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .bank-actions .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: end;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 40px;
        padding: 0 13px;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 650;
      }

      .btn.primary {
        color: var(--ink-inverse);
        background: var(--accent);
      }

      .btn.primary:hover {
        background: var(--accent-deep);
      }

      .btn.secondary {
        color: var(--ink);
        background: var(--surface-recessed);
        border-color: var(--line);
      }

      .btn.secondary:hover {
        background: var(--line-soft);
      }

      .pinyin-list {
        display: grid;
        gap: 10px;
        max-height: 320px;
        overflow: auto;
        padding-right: 4px;
      }

      .pinyin-row {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .pinyin-main {
        display: grid;
        grid-template-columns: minmax(72px, 0.8fr) minmax(120px, 1.4fr);
        gap: 8px;
        align-items: center;
      }

      .word-chip {
        min-height: 38px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-recessed);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .word-chip.has-polyphone {
        border-color: var(--caution);
        background: var(--caution-tint);
      }

      .polyphone-badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 6px;
        border-radius: 9999px;
        background: var(--caution-pill);
        color: var(--caution-deep);
        border: 1px solid var(--caution);
        font-size: 10px;
        font-weight: 650;
        letter-spacing: 0.02em;
        line-height: 1.4;
      }

      .polyphone-hints {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-left: 2px;
        font-size: 12px;
      }

      .polyphone-group {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px 2px 8px;
        background: var(--caution-tint);
        border: 1px dashed var(--caution);
        border-radius: 6px;
      }

      .polyphone-group .label {
        color: var(--caution-deep);
        font-size: 11px;
        font-weight: 650;
        margin: 0;
      }

      .polyphone-chip {
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 4px;
        padding: 2px 7px;
        font-size: 11px;
        cursor: pointer;
        color: var(--ink-soft);
        line-height: 1.3;
      }

      .polyphone-chip:hover {
        background: var(--surface-recessed);
      }

      .polyphone-chip.active {
        border-color: var(--accent);
        background: var(--accent-tint);
        color: var(--accent-deep);
        font-weight: 650;
      }

      .polyphone-chip .ex {
        color: var(--muted);
        margin-left: 3px;
        font-weight: 400;
      }

      .preview {
        padding: 22px;
        overflow: auto;
      }

      .sheet {
        display: grid;
        gap: 18px;
        justify-content: center;
      }

      .page {
        width: 210mm;
        min-height: 297mm;
        padding: 14mm 14mm 13mm;
        background: var(--paper);
        box-shadow: 0 18px 45px var(--paper-shadow);
        color: var(--paper-ink);
        page-break-after: always;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .page:last-child {
        page-break-after: auto;
      }

      .paper-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
        padding-bottom: 6mm;
        border-bottom: 1px solid var(--paper-rule-soft);
      }

      .paper-title {
        min-width: 0;
        margin: 0;
        font-size: 21pt;
        line-height: 1.2;
        font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
        font-weight: 700;
      }

      .paper-title:empty {
        min-height: 0;
      }

      .paper-meta {
        display: flex;
        gap: 10mm;
        color: var(--paper-meta-ink);
        font-size: 10.5pt;
        white-space: nowrap;
      }

      .paper-meta span {
        display: inline-flex;
        gap: 3mm;
        align-items: baseline;
      }

      .meta-line {
        display: inline-block;
        width: 25mm;
        border-bottom: 1px solid var(--paper-rule);
      }

      .word-list {
        display: flex;
        flex-wrap: wrap;
        column-gap: 8mm;
        row-gap: 5.4mm;
        align-items: flex-start;
        padding-top: 7mm;
      }

      .item {
        display: inline-grid;
        grid-template-columns: auto auto;
        gap: 2.2mm;
        width: max-content;
        max-width: 100%;
        break-inside: avoid;
      }

      .index {
        padding-top: 6.2mm;
        color: var(--paper-meta-ink);
        font-size: 10pt;
        text-align: left;
        white-space: nowrap;
      }

      .practice {
        min-width: 0;
        max-width: 100%;
      }

      .practice-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 2.6mm;
        align-items: flex-start;
      }

      .char-unit {
        display: grid;
        gap: 1.8mm;
        justify-items: center;
        break-inside: avoid;
      }

      .char-pinyin {
        min-height: 6mm;
        color: var(--paper-ink);
        font-size: 13pt;
        line-height: 1.2;
        text-align: center;
        white-space: nowrap;
        min-width: 13.2mm;
      }

      .unit-cells {
        display: flex;
        flex-wrap: wrap;
        gap: 2.3mm;
        align-items: center;
        justify-content: center;
      }

      .cell {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 13.2mm;
        height: 13.2mm;
        border: 1.2px solid var(--paper-rule);
        overflow: hidden;
        background: var(--paper-cell);
        color: var(--paper-trace);
        font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
        font-size: 24pt;
        line-height: 1;
      }

      .cell::before,
      .cell::after,
      .cell-diagonal {
        content: "";
        position: absolute;
        z-index: 0;
        pointer-events: none;
      }

      .cell::before {
        top: 0;
        bottom: 0;
        left: 50%;
        border-left: 1px dashed var(--paper-rule-soft);
      }

      .cell::after {
        top: 50%;
        left: 0;
        right: 0;
        border-top: 1px dashed var(--paper-rule-soft);
      }

      .cell-diagonal {
        display: none;
        top: 50%;
        left: -19%;
        width: 138%;
        border-top: 1px dashed var(--paper-rule-soft);
        transform-origin: center;
      }

      .cell.mi .cell-diagonal {
        display: block;
      }

      .cell-diagonal.forward {
        transform: rotate(45deg);
      }

      .cell-diagonal.back {
        transform: rotate(-45deg);
      }

      .cell-text {
        position: relative;
        z-index: 1;
      }

      .cell.blank,
      .line-cell.blank {
        color: transparent;
      }

      .line-cell {
        width: 16mm;
        height: 13.2mm;
        border-bottom: 1.4px solid var(--paper-rule);
        display: inline-flex;
        align-items: flex-end;
        justify-content: center;
        color: var(--paper-trace);
        font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
        font-size: 23pt;
      }

      .copy-source {
        color: var(--paper-ink);
      }

      .empty {
        padding: 18mm 0;
        color: var(--paper-meta-ink);
        text-align: center;
        font-size: 13pt;
      }

      .quick-bank {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-recessed);
      }

      .quick-bank summary {
        cursor: pointer;
        padding: 10px 11px;
        color: var(--ink);
        font-size: 15px;
        font-weight: 650;
        user-select: none;
      }

      .quick-bank-body {
        display: grid;
        gap: 11px;
        max-height: 320px;
        overflow: auto;
        padding: 0 11px 11px;
      }

      .quick-bank-block h4 {
        margin: 0 0 6px;
        font-size: 15px;
        font-weight: 650;
      }

      .quick-bank-block h4 a,
      .quick-bank-block li a {
        color: var(--accent-dark);
        text-decoration: none;
      }

      .quick-bank-block h4 a:hover,
      .quick-bank-block li a:hover {
        text-decoration: underline;
      }

      .quick-bank-block ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
      }

      .quick-bank-block li {
        font-size: 12px;
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .controls {
          position: static;
          height: auto;
        }

        .preview {
          padding: 12px;
        }

        .page {
          transform-origin: top center;
        }
      }

      @media screen {
        .app.preview-collapsed {
          grid-template-columns: minmax(320px, 780px);
          justify-content: center;
          background: var(--surface);
        }

        .app.preview-collapsed .controls {
          position: static;
          width: 100%;
          height: auto;
          min-height: 100vh;
          border-right: 0;
        }

        .app.preview-collapsed .preview {
          position: absolute;
          top: 0;
          left: -100000px;
          width: 210mm;
          height: 0;
          overflow: hidden;
          opacity: 0;
          pointer-events: none;
        }
      }

      @media print {
        @page {
          size: A4;
          margin: 0;
        }

        html,
        body {
          width: 210mm;
          background: #fff;
        }

        body * {
          visibility: hidden;
        }

        .sheet,
        .sheet * {
          visibility: visible;
        }

        .controls {
          display: none;
        }

        .app,
        .preview,
        .sheet {
          display: block;
          padding: 0;
          margin: 0;
          background: #fff;
        }

        .app.preview-collapsed,
        .app.preview-collapsed .preview {
          display: block;
          position: static;
          width: auto;
          height: auto;
          overflow: visible;
          opacity: 1;
        }

        .page {
          width: 210mm;
          min-height: 297mm;
          margin: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>

    <main id="app" class="app">
      <aside class="controls">
        <div class="topbar">
          <h1>看拼音写汉字练习纸</h1>
          <button id="togglePreviewBtn" class="btn secondary" type="button">收起预览</button>
        </div>

        <section class="section">
          <label class="label" for="words">中文字词列表</label>
          <textarea id="words" spellcheck="false">春天
学校
认真
一心一意
长大
音乐</textarea>
          <p class="hint">一行一个词。多音字请在下方拼音列表里手动修改。</p>
          <p id="pinyinStatus" class="status"></p>
        </section>

        <section class="section">
          <label class="label" for="wordBank">内置词库（部编版参考）</label>
          <div class="bank-actions">
            <div class="row">
              <select id="wordBank" aria-label="年级与册次">
                <option value="">选择年级/册次</option>
              </select>
              <select id="wordUnit" aria-label="单元" disabled>
                <option value="">整册全部</option>
              </select>
            </div>
            <div class="row">
              <span class="hint" id="bankStatus">内置词库是可编辑参考，加载后仍可增删字词。</span>
              <button id="loadBankBtn" class="btn secondary" type="button">加载</button>
            </div>
          </div>
          <details class="quick-bank">
            <summary>年级单元快速入口</summary>
            <div id="quickBankLinks" class="quick-bank-body"></div>
          </details>
        </section>

        <section class="section">
          <div class="grid-2">
            <div class="field">
              <label class="label" for="title">标题</label>
              <input id="title" value="看拼音写汉字" />
            </div>
            <div class="field">
              <label class="label" for="dateText">日期</label>
              <input id="dateText" placeholder="可留空" />
            </div>
          </div>
        </section>

        <section class="section">
          <div class="grid-2">
            <div class="field">
              <label class="label" for="mode">练习模式</label>
              <select id="mode">
                <option value="write">看拼音写汉字</option>
                <option value="trace">描红练习</option>
                <option value="copy">左范字右抄写</option>
                <option value="dictation">听写纸</option>
              </select>
            </div>
            <div class="field">
              <label class="label" for="gridType">格子样式</label>
              <select id="gridType">
                <option value="tian">田字格</option>
                <option value="mi">米字格</option>
                <option value="line">横线</option>
              </select>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="grid-3">
            <div class="field">
              <label class="label" for="copies">每字空格</label>
              <select id="copies">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </div>
            <div class="field">
              <label class="label" for="perPage">每页上限</label>
              <select id="perPage">
                <option value="16">16</option>
                <option value="24">24</option>
                <option value="32" selected>32</option>
                <option value="40">40</option>
                <option value="48">48</option>
              </select>
            </div>
            <div class="field">
              <label class="label" for="showMeta">姓名栏</label>
              <select id="showMeta">
                <option value="no" selected>隐藏</option>
                <option value="yes">显示</option>
              </select>
            </div>
          </div>
        </section>

        } catch (error) {
          els.masteredStatus.textContent =
            "当前浏览器不允许本地保存，已掌握字词仅本次打开有效。";
        }
      }

      function loadConfigSettings() {
        let saved = null;
        try {
          const raw = localStorage.getItem(storageKeys.config);
          if (raw) saved = JSON.parse(raw);
        } catch (error) {
          return;
        }
        if (!saved || typeof saved !== "object") return;

        for (const key of persistedConfigKeys) {
          if (key === "wordUnit") continue;
          const value = saved[key];
          if (typeof value !== "string") continue;
          if (!els[key]) continue;
          if (key === "wordBank") {
            els.wordBank.value = value;
            populateUnitSelect(value);
            continue;
          }
          els[key].value = value;
        }

        if (typeof saved.wordUnit === "string" && els.wordUnit) {
          els.wordUnit.value = saved.wordUnit;
        }
      }

      function saveConfigSettings() {
        if (!configHydrated) return;
        const payload = {};
        for (const key of persistedConfigKeys) {
          if (els[key]) payload[key] = els[key].value;
        }
        try {
          localStorage.setItem(storageKeys.config, JSON.stringify(payload));
        } catch (error) {
          // quota exceeded or private mode — silently skip; config is convenience, not data
        }
      }

      function loadCustomPinyin() {
        try {
          const raw = localStorage.getItem(storageKeys.customPinyin);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return;
          for (const [word, pinyin] of Object.entries(parsed)) {
            if (typeof word === "string" && typeof pinyin === "string") {
              customPinyin.set(word, pinyin);
            }
          }
        } catch (error) {
          // ignore corrupted blob
        }
      }

      function saveCustomPinyin() {
        const payload = Object.fromEntries(customPinyin);
        try {
          localStorage.setItem(storageKeys.customPinyin, JSON.stringify(payload));
        } catch (error) {
          // silently skip
        }
      }

      function setPreviewCollapsed(collapsed, persist = true) {
        els.app.classList.toggle("preview-collapsed", collapsed);
        els.togglePreviewBtn.textContent = collapsed ? "展开预览" : "收起预览";
        els.togglePreviewBtn.setAttribute(
          "aria-expanded",
          collapsed ? "false" : "true",
        );

        if (!persist) return;
        try {
          localStorage.setItem(
            storageKeys.previewCollapsed,
            collapsed ? "yes" : "no",
          );
        } catch (error) {
          // Preview collapse is still usable without persistence.
        }
      }

      function loadPreviewSettings() {
        let collapsed = false;
        try {
          collapsed =
            localStorage.getItem(storageKeys.previewCollapsed) === "yes";
        } catch (error) {
          collapsed = false;
        }
        setPreviewCollapsed(collapsed, false);
      }

      function chineseChars(word) {
        return Array.from(word).filter((char) => /\p{Script=Han}/u.test(char));
      }

      function numberToTone(syllable) {
        const match = syllable.match(/^([a-züv:]+)([1-5])$/i);
        if (!match) return syllable.replace("u:", "ü").replace("v", "ü");
        let base = match[1].toLowerCase().replace("u:", "ü").replace("v", "ü");
        const tone = Number(match[2]);
        if (tone === 5) return base;

        let target = -1;
        if (base.includes("a")) target = base.indexOf("a");
        else if (base.includes("e")) target = base.indexOf("e");
        else if (base.includes("ou")) target = base.indexOf("o");
        else {
          for (let i = base.length - 1; i >= 0; i -= 1) {
            if ("aeiouü".includes(base[i])) {
              target = i;
              break;
            }
          }
        }

        if (target < 0) return base;
        const markSet = toneMarks[base[target]];
        return `${base.slice(0, target)}${markSet[tone - 1]}${base.slice(target + 1)}`;
      }

      function fallbackWordPinyin(word) {
        return chineseChars(word)
          .map((char) => numberToTone(fallbackPinyin.get(char) || char))
          .join(" ");
      }

      function autoPinyin(word) {
        const pinyinFn =
          window.pinyinPro && typeof window.pinyinPro.pinyin === "function"
            ? window.pinyinPro.pinyin
            : null;

        if (!pinyinFn) {
          return fallbackWordPinyin(word);
        }

        try {
          return pinyinFn(word, {
            toneType: "symbol",
            type: "array",
            nonZh: "removed",
          }).join(" ");
        } catch (error) {
          return fallbackWordPinyin(word);
        }
      }

      function syncItems() {
        const rawWords = splitWords(els.words.value);
        const mastered = masteredWordSet();
        const shouldHideMastered = els.hideMastered.value === "yes";
        hiddenMasteredCount = shouldHideMastered
          ? rawWords.filter((word) => mastered.has(word)).length
          : 0;
        const words = shouldHideMastered
          ? rawWords.filter((word) => !mastered.has(word))
          : rawWords;

        items = words.map((word) => ({
          word,
          pinyin: customPinyin.get(word) || autoPinyin(word),
        }));
        updateMasteredStatus(mastered.size, hiddenMasteredCount);
        renderPinyinEditor();
        renderSheet();
        saveConfigSettings();
      }

      function populateBankSelect() {
        els.wordBank.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "选择年级/册次";
        els.wordBank.append(placeholder);
        wordBankOrder.forEach((key) => {
          const bank = wordBanks[key];
          if (!bank) return;
          const opt = document.createElement("option");
          opt.value = key;
          opt.textContent = bank.name;
          els.wordBank.append(opt);
        });
      }

      function populateUnitSelect(bankKey) {
        els.wordUnit.innerHTML = "";
        const all = document.createElement("option");
        all.value = "";
        all.textContent = "整册全部";
        els.wordUnit.append(all);
        const bank = wordBanks[bankKey];
        if (!bank) {
          els.wordUnit.disabled = true;
          return;
        }
        bank.units.forEach((unit) => {
          const opt = document.createElement("option");
          opt.value = unit.key;
          opt.textContent = unit.name;
          els.wordUnit.append(opt);
        });
        els.wordUnit.disabled = false;
      }

      function loadSelectedBank({ silent = false } = {}) {
        const bankKey = els.wordBank.value;
        const bank = wordBanks[bankKey];
        if (!bank) {
          els.bankStatus.textContent = "请选择年级/册次。";
          return;
        }

        const unitKey = els.wordUnit.value;
        const words = unitWords(bankKey, unitKey);
        const unit = unitKey ? bank.units.find((u) => u.key === unitKey) : null;
        const label = unit ? `${bank.name}·${unit.name}` : `${bank.name}（整册）`;

        const currentWords = splitWords(els.words.value);
        if (!silent && currentWords.length) {
          const shouldReplace = window.confirm(
            `加载“${label}”会替换当前输入的 ${currentWords.length} 个字词。是否继续？`,
          );
          if (!shouldReplace) return;
        }

        customPinyin = new Map();
        els.words.value = words.join("\n");
        els.bankStatus.textContent = `已加载“${label}”，共 ${words.length} 个字词。`;
        if (unit) {
          els.title.value = `${bank.short || bank.name} ${unit.name} 看拼音写汉字`;
        } else {
          els.title.value = `${bank.name} 看拼音写汉字`;
        }
        writeHash(bankKey, unitKey);
        updateDocumentTitle();
        syncItems();
      }

      function readHash() {
        const hash = window.location.hash.replace(/^#/, "");
        if (!hash) return { bank: "", unit: "" };
        const params = new URLSearchParams(hash);
        return {
          bank: params.get("bank") || "",
          unit: params.get("unit") || "",
        };
      }

      function writeHash(bank, unit) {
        const params = new URLSearchParams();
        if (bank) params.set("bank", bank);
        if (unit) params.set("unit", unit);
        const next = params.toString();
        const target = next ? `#${next}` : "";
        if (window.location.hash !== target) {
          history.replaceState(null, "", target || window.location.pathname);
        }
      }

      function applyHashOnLoad() {
        const { bank, unit } = readHash();
        if (!bank || !wordBanks[bank]) return false;
        els.wordBank.value = bank;
        populateUnitSelect(bank);
        if (unit && wordBanks[bank].units.some((u) => u.key === unit)) {
          els.wordUnit.value = unit;
        }
        loadSelectedBank({ silent: true });
        return true;
      }

      function updateDocumentTitle() {
        const bankKey = els.wordBank.value;
        const unitKey = els.wordUnit.value;
        const bank = wordBanks[bankKey];
        const unit = bank && unitKey ? bank.units.find((u) => u.key === unitKey) : null;
        const base = "看拼音写汉字练习纸";
        if (bank && unit) {
          document.title = `${bank.short || bank.name} ${unit.name} - ${base}`;
        } else if (bank) {
          document.title = `${bank.name} - ${base}`;
        } else {
          document.title = `${base} | 一到六年级部编版语文练字打印工具`;
        }
      }

      function renderQuickBankLinks() {
        if (!els.quickBankLinks) return;
        els.quickBankLinks.innerHTML = "";
        wordBankOrder.forEach((bankKey) => {
          const bank = wordBanks[bankKey];
          if (!bank) return;
          const block = document.createElement("section");
          block.className = "quick-bank-block";

          const title = document.createElement("h4");
          const titleLink = document.createElement("a");
          titleLink.href = `#bank=${bankKey}`;
          titleLink.textContent = `${bank.name}（整册）`;
          title.append(titleLink);
          block.append(title);

          const list = document.createElement("ul");
          bank.units.forEach((unit) => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = `#bank=${bankKey}&unit=${unit.key}`;
            a.textContent = unit.name;
            li.append(a);
            list.append(li);
          });
          block.append(list);
          els.quickBankLinks.append(block);
        });
      }

      function renderPinyinEditor() {
        els.pinyinList.innerHTML = "";
        if (!items.length) {
          els.pinyinList.innerHTML = hiddenMasteredCount
            ? '<p class="hint">当前字词已全部隐藏，暂无需要校对的拼音。</p>'
            : '<p class="hint">输入词语后可校对拼音。</p>';
          return;
        }

        const frag = document.createDocumentFragment();
        items.forEach((item) => {
          const polyInfo = getPolyphonesInWord(item.word);

          const row = document.createElement("div");
          row.className = "pinyin-row";

          const main = document.createElement("div");
          main.className = "pinyin-main";

          const word = document.createElement("div");
          word.className =
            "word-chip" + (polyInfo.length ? " has-polyphone" : "");
          word.title = polyInfo.length
            ? `${item.word}（含多音字：${polyInfo.map((p) => p.char).join("、")}）`
            : item.word;
          word.append(document.createTextNode(item.word));
          if (polyInfo.length) {
            const badge = document.createElement("span");
            badge.className = "polyphone-badge";
            badge.textContent = "多音";
            word.append(badge);
          }

          const input = document.createElement("input");
          input.value = item.pinyin;
          input.setAttribute("aria-label", `${item.word} 的拼音`);

          main.append(word, input);
          row.append(main);

          let hintsRow = null;
          if (polyInfo.length) {
            hintsRow = document.createElement("div");
            hintsRow.className = "polyphone-hints";
            polyInfo.forEach((p) => {
              const group = document.createElement("div");
              group.className = "polyphone-group";
              group.dataset.charIndex = String(p.index);

              const lbl = document.createElement("span");
              lbl.className = "label";
              lbl.textContent = `${p.char}：`;
              group.append(lbl);

              p.options.forEach((opt) => {
                const chip = document.createElement("button");
                chip.type = "button";
                chip.className = "polyphone-chip";
                chip.dataset.pinyin = opt.p;
                const py = document.createElement("span");
                py.textContent = opt.p;
                const ex = document.createElement("span");
                ex.className = "ex";
                ex.textContent = opt.e;
                chip.append(py, ex);
                chip.addEventListener("click", () => {
                  const parts = splitPinyin(item);
                  parts[p.index] = opt.p;
                  const next = parts.join(" ");
                  customPinyin.set(item.word, next);
                  item.pinyin = next;
                  input.value = next;
                  refreshActive();
                  renderSheet();
                  saveCustomPinyin();
                });
                group.append(chip);
              });
              hintsRow.append(group);
            });
            row.append(hintsRow);
          }

          function refreshActive() {
            if (!hintsRow) return;
            const parts = splitPinyin(item);
            hintsRow.querySelectorAll(".polyphone-group").forEach((g) => {
              const idx = Number(g.dataset.charIndex);
              const cur = parts[idx] || "";
              g.querySelectorAll(".polyphone-chip").forEach((chip) => {
                chip.classList.toggle(
                  "active",
                  chip.dataset.pinyin === cur,
                );
              });
            });
          }

          input.addEventListener("input", () => {
            const v = input.value.trim();
            customPinyin.set(item.word, v);
            item.pinyin = v;
            refreshActive();
            renderSheet();
            saveCustomPinyin();
          });

          refreshActive();
          frag.append(row);
        });

        els.pinyinList.append(frag);
      }

      function makeCell(char, isSource = false) {
        const gridType = els.gridType.value;
        const cell = document.createElement("span");
        cell.className =
          gridType === "line"
            ? "line-cell"
            : `cell ${gridType === "mi" ? "mi" : ""}`;
        if (!char) cell.classList.add("blank");
        if (isSource) cell.classList.add("copy-source");

        if (gridType === "line") {
          cell.textContent = char || "字";
          return cell;
        }

        if (gridType === "mi") {
          const forward = document.createElement("span");
          forward.className = "cell-diagonal forward";
          const back = document.createElement("span");
          back.className = "cell-diagonal back";
          cell.append(forward, back);
        }

        const text = document.createElement("span");
        text.className = "cell-text";
        text.textContent = char || "字";
        cell.append(text);
        return cell;
      }

      function splitPinyin(item) {
        const parts = item.pinyin.split(/\s+/).filter(Boolean);
        const chars = chineseChars(item.word);
        if (parts.length === chars.length) return parts;
        if (chars.length === 1) return [item.pinyin];
        return chars.map((_, index) => parts[index] || "");
      }

      function buildPracticeGroups(item) {
        const mode = els.mode.value;
        const repeat = Number(els.copies.value);
        const chars = chineseChars(item.word);
        const pinyinParts = splitPinyin(item);
        const grid = document.createElement("div");
        grid.className = "practice-grid";

        chars.forEach((char, charIndex) => {
          const unit = document.createElement("div");
          unit.className = "char-unit";

          const py = document.createElement("div");
          py.className = "char-pinyin";
          py.textContent = mode === "dictation" ? "" : pinyinParts[charIndex];

          const cells = document.createElement("div");
          cells.className = "unit-cells";

          if (mode === "copy") {
            cells.append(makeCell(char, true));
            for (let i = 0; i < repeat; i += 1) {
              cells.append(makeCell(""));
            }
          } else {
            const showChar = mode === "trace" ? char : "";
            for (let i = 0; i < repeat; i += 1) {
              cells.append(makeCell(showChar));
            }
          }

          unit.append(py, cells);
          grid.append(unit);
        });

        return grid;
      }

      function buildPage(pageItems, startIndex) {
        const page = document.createElement("article");
        page.className = "page";

        const head = document.createElement("header");
        head.className = "paper-head";

        const title = document.createElement("h2");
        title.className = "paper-title";
        title.textContent = els.title.value.trim();
        head.append(title);

        if (els.showMeta.value === "yes") {
          const meta = document.createElement("div");
          meta.className = "paper-meta";
          const dateText = els.dateText.value.trim();
          meta.innerHTML = `
            <span>姓名 <i class="meta-line"></i></span>
            <span>${dateText ? `日期 ${escapeHtml(dateText)}` : '日期 <i class="meta-line"></i>'}</span>
          `;
          head.append(meta);
        }

        page.append(head);

        const list = document.createElement("div");
        list.className = "word-list";

        pageItems.forEach((item, idx) => {
          const mode = els.mode.value;
          const row = document.createElement("section");
          row.className = "item";

          const index = document.createElement("div");
          index.className = "index";
          index.textContent = `${startIndex + idx + 1}.`;

          const practice = document.createElement("div");
          practice.className = "practice";

          practice.append(buildPracticeGroups(item));
          row.append(index, practice);
          list.append(row);
        });

        if (!pageItems.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = hiddenMasteredCount
            ? "当前字词已全部隐藏，请调整已掌握字词或显示设置。"
            : "请在左侧输入中文字词。";
          list.append(empty);
        }

        page.append(list);
        return page;
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          };
          return map[char];
        });
      }

      function renderSheet() {
        els.sheet.innerHTML = "";
        const perPage = Number(els.perPage.value);
        const pages = [];

        if (!items.length) {
          pages.push([]);
        } else {
          for (let i = 0; i < items.length; i += perPage) {
            pages.push(items.slice(i, i + perPage));
          }
        }

        const frag = document.createDocumentFragment();
        pages.forEach((pageItems, pageIndex) => {
          frag.append(buildPage(pageItems, pageIndex * perPage));
        });
        els.sheet.append(frag);

        const pinyinLoaded =
          window.pinyinPro && typeof window.pinyinPro.pinyin === "function";
        els.pinyinStatus.textContent = pinyinLoaded
          ? "拼音库已加载。"
          : "未能加载完整拼音库，当前只使用内置示例字词拼音；联网后刷新页面可自动恢复。";
        els.pinyinStatus.className = pinyinLoaded ? "status" : "status warn";
      }

      function resetExample() {
        const confirmed = window.confirm(
          "将清空当前字词与设置，恢复为示例。继续？",
        );
        if (!confirmed) return;
        customPinyin = new Map();
        saveCustomPinyin();
        els.words.value = "春天\n学校\n认真\n一心一意\n长大\n音乐";
        els.title.value = "看拼音写汉字";
        els.dateText.value = "";
        els.mode.value = "write";
        els.gridType.value = "tian";
        els.copies.value = "1";
        els.perPage.value = "32";
        els.showMeta.value = "no";
        els.wordBank.value = "";
        populateUnitSelect("");
        writeHash("", "");
        updateDocumentTitle();
        els.bankStatus.textContent = "内置词库是可编辑参考，加载后仍可增删字词。";
        syncItems();
      }

      [
        els.words,
        els.title,
        els.dateText,
        els.mode,
        els.gridType,
        els.copies,
        els.perPage,
        els.showMeta,
      ].forEach((el) => {
        el.addEventListener("input", syncItems);
        el.addEventListener("change", syncItems);
      });

      [els.masteredWords, els.hideMastered].forEach((el) => {
        el.addEventListener("input", () => {
          saveMasteredSettings();
          syncItems();
        });
        el.addEventListener("change", () => {
          saveMasteredSettings();
          syncItems();
        });
      });

      els.wordBank.addEventListener("change", () => {
        populateUnitSelect(els.wordBank.value);
        writeHash(els.wordBank.value, "");
        updateDocumentTitle();
      });

      els.wordUnit.addEventListener("change", () => {
        writeHash(els.wordBank.value, els.wordUnit.value);
        updateDocumentTitle();
      });

      window.addEventListener("hashchange", () => {
        applyHashOnLoad();
      });

      els.printBtn.addEventListener("click", () => window.print());
      els.resetBtn.addEventListener("click", resetExample);
      els.loadBankBtn.addEventListener("click", () => loadSelectedBank());
      els.togglePreviewBtn.addEventListener("click", () => {
        setPreviewCollapsed(!els.app.classList.contains("preview-collapsed"));
      });

      loadMasteredSettings();
      loadPreviewSettings();
      populateBankSelect();
      renderQuickBankLinks();
      loadConfigSettings();
      loadCustomPinyin();
      configHydrated = true;
      const loadedFromHash = applyHashOnLoad();
      if (!loadedFromHash) {
        updateDocumentTitle();
        syncItems();
      }
      window.addEventListener("load", syncItems);
    </script>
  </body>
</html>
